<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="uTT2vLHXrvh44esSpln_EMc1QEFjkN0vjJZ04UgI0Qc" />
    <title>Slop Killer - The Ultimate AI Slop Index</title>
    <meta name="description" content="100+ Solutions to Reclaim Your Human-Centric Internet">
    <style>
        :root {
            --primary-color: #ff4e4e;
            --primary-hover: #ff3333;
            --secondary-color: #ff6666;
            --text-color: #eeeeee;
            --text-light: #aaaaaa;
            --background-color: #0a0a0a;
            --card-bg: #141414;
            --border-color: #2a2a2a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem 0;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .stat-item {
            text-align: center;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-number {
            display: block;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            animation: pulse 2s infinite;
        }

        .stat-label {
            display: block;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .search-container {
            margin: 2rem 0;
            text-align: center;
        }

        #search-input {
            width: 100%;
            max-width: 800px;
            padding: 1.5rem 2rem;
            border: 3px solid var(--border-color);
            border-radius: 50px;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        #search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 6px rgba(255, 78, 78, 0.2);
            transform: translateY(-2px);
        }

        #search-input::placeholder {
            color: var(--text-light);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .category-tab:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .category-tab.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        @media (min-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1200px) {
            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }

        .card.hidden {
            opacity: 0;
            transform: translateY(20px);
            height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-color);
        }

        .card h3 {
            margin-bottom: 1rem;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card p {
            margin-bottom: 1.5rem;
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .fix-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
        }

        .fix-button:hover {
            background: linear-gradient(135deg, var(--primary-hover), var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 78, 78, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .category-tabs {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
        }

        /* Footer styles */
        .footer {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem 0;
            text-align: center;
            margin-top: 4rem;
            margin-bottom: 80px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .footer-link {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: var(--text-color);
        }

        /* Add white color for Site Map link */
        .footer-content p a {
            color: white;
            text-decoration: none;
        }

        .footer-content p a:hover {
            color: var(--text-color);
            text-decoration: none;
        }

        /* Breadcrumb navigation styles */
        .breadcrumb {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            display: inline-block;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: #f0f0f0;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a> &gt; Solutions Directory
            </div>
            <h1>The Ultimate AI Slop Index</h1>
            <p class="subtitle">100+ Solutions to Reclaim Your Human-Centric Internet</p>
            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-number">100</span>
                    <span class="stat-label">Verified Solutions</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search your pain point (e.g. Pinterest AI)...">
        </div>

        <div class="category-tabs" id="category-tabs">
            <button class="category-tab active" data-category="all">All</button>
        </div>

        <main id="grid-container" class="cards-grid">
            <!-- Dynamically generated cards will be displayed here -->
        </main>
    </div>

    <script>
        // Global variables
        let allKeywords = [];
        let allCards = [];
        let categories = {};

        // Initialization function
        function init() {
            // Load keyword data from JSON file
            fetch('seo_keywords.json')
                .then(response => response.json())
                .then(keywords => {
                    allKeywords = keywords;
                    
                    // Categorize by intent
                    categories = {};
                    keywords.forEach(keyword => {
                        if (!categories[keyword.intent]) {
                            categories[keyword.intent] = [];
                        }
                        categories[keyword.intent].push(keyword);
                    });

                    // Generate category tabs
                    const categoryTabs = document.getElementById('category-tabs');
                    Object.keys(categories).forEach(intent => {
                        const button = document.createElement('button');
                        button.className = 'category-tab';
                        button.dataset.category = intent;
                        button.textContent = intent;
                        categoryTabs.appendChild(button);
                    });

                    // Initial render of all cards
                    renderCards(keywords);

                    // Generate JSON-LD structured data
                    generateJSONLD(keywords);

                    // Bind event listeners
                    bindEventListeners();
                })
                .catch(error => {
                    console.error('Error loading keywords:', error);
                    document.getElementById('grid-container').innerHTML = '<div class="no-results">Failed to load data, please refresh the page and try again</div>';
                });
        }

        // Card rendering function
        function renderCards(data) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            allCards = [];
            
            if (data.length === 0) {
                container.innerHTML = '<div class="no-results">No matching solutions found</div>';
                return;
            }

            data.forEach(keyword => {
                const card = document.createElement('article');
                card.className = 'card';
                card.dataset.keyword = keyword.keyword.toLowerCase();
                card.dataset.scenario = keyword.scenario.toLowerCase();
                card.dataset.intent = keyword.intent;
                
                // Generate URL
                const url = keyword.keyword.toLowerCase().replace(/\s+/g, '-') + '.html';
                
                // Generate scenario summary
                const scenarioSummary = keyword.scenario.substring(0, 100) + '...';
                
                card.innerHTML = `
                    <h3>${keyword.keyword}</h3>
                    <p>${scenarioSummary}</p>
                    <a href="${url}" class="fix-button" title="Solution for ${keyword.keyword}">Fix Now</a>
                `;
                
                container.appendChild(card);
                allCards.push(card);
            });
        }

        // Data filtering function
        function filterData() {
            const activeTab = document.querySelector('.category-tab.active');
            const category = activeTab.dataset.category;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            let filteredKeywords = allKeywords.filter(keyword => {
                const matchesCategory = category === 'all' || keyword.intent === category;
                const matchesSearch = !searchTerm || 
                    keyword.keyword.toLowerCase().includes(searchTerm) || 
                    keyword.scenario.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
            
            // Re-render cards
            renderCards(filteredKeywords);
        }

        // Generate JSON-LD structured data
        function generateJSONLD(keywords) {
            const jsonLd = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": "The Ultimate AI Slop Index",
                "description": "100+ Solutions to Reclaim Your Human-Centric Internet",
                "itemListElement": keywords.map((keyword, index) => {
                    const url = keyword.keyword.toLowerCase().replace(/\s+/g, '-') + '.html';
                    return {
                        "@type": "ListItem",
                        "position": index + 1,
                        "name": keyword.keyword,
                        "url": url
                    };
                })
            };
            
            // Add JSON-LD to page
            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.textContent = JSON.stringify(jsonLd);
            document.head.appendChild(script);
        }

        // Bind event listeners
        function bindEventListeners() {
            // Category tab click event
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    // Update active tab
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    // Filter data
                    filterData();
                });
            });

            // Search functionality
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', filterData);
        }

        // Initialize after page load
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="https://www.wangdadi.xyz" class="footer-link">Home</a>
                <a href="directory.html" class="footer-link">Solutions Directory</a>
            </div>
            <p>&copy; 2026 Slop Killer. All rights reserved. | <a href="sitemap.html">Site Map</a> | Support: 457239850@qq.com</p>
        </div>
    </footer>
</body>
</html>
